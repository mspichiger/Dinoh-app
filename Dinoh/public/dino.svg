<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="64" height="64">
  <!-- Blue pixel dino -->
  <g fill="#5b8fd9">
    <!-- head -->
    <rect x="9" y="2" width="5" height="1"/>
    <rect x="8" y="3" width="6" height="1"/>
    <rect x="8" y="4" width="6" height="1"/>
    <rect x="8" y="5" width="2" height="1"/>
    <rect x="11" y="5" width="3" height="1"/>
    <rect x="8" y="6" width="6" height="1"/>
    <rect x="9" y="7" width="5" height="1"/>
    <!-- neck + body -->
    <rect x="2" y="7" width="8" height="1"/>
    <rect x="1" y="8" width="10" height="1"/>
    <rect x="1" y="9" width="11" height="1"/>
    <rect x="1" y="10" width="11" height="1"/>
    <rect x="2" y="11" width="9" height="1"/>
    <!-- legs -->
    <rect x="2" y="12" width="2" height="2"/>
    <rect x="8" y="12" width="2" height="2"/>
    <rect x="2" y="14" width="3" height="1"/>
    <rect x="7" y="14" width="3" height="1"/>
  </g>
  <!-- eye -->
  <rect x="12" y="4" width="1" height="1" fill="#ffffff"/>
</svg>
