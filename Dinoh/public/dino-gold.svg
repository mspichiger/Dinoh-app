<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 24" shape-rendering="crispEdges">
    <defs>
        <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFE36B" />
            <stop offset="45%" stop-color="#FFC72C" />
            <stop offset="100%" stop-color="#B8860B" />
        </linearGradient>
    </defs>
    <g fill="url(#gold)">
        <!-- Head -->
        <rect x="9" y="1" width="10" height="1" />
        <rect x="8" y="2" width="12" height="1" />
        <rect x="8" y="3" width="12" height="1" />
        <rect x="8" y="4" width="12" height="1" />
        <rect x="8" y="5" width="12" height="1" />
        <rect x="7" y="6" width="13" height="1" />
        <rect x="7" y="7" width="13" height="1" />
        <!-- Neck / body -->
        <rect x="3" y="8" width="2" height="1" />
        <rect x="8" y="8" width="11" height="1" />
        <rect x="3" y="9" width="2" height="1" />
        <rect x="8" y="9" width="11" height="1" />
        <rect x="3" y="10" width="16" height="1" />
        <rect x="3" y="11" width="16" height="1" />
        <rect x="4" y="12" width="15" height="1" />
        <rect x="4" y="13" width="15" height="1" />
        <rect x="5" y="14" width="14" height="1" />
        <rect x="6" y="15" width="13" height="1" />
        <!-- Tail -->
        <rect x="19" y="12" width="3" height="1" />
        <rect x="20" y="13" width="2" height="1" />
        <!-- Legs -->
        <rect x="6" y="16" width="3" height="1" />
        <rect x="13" y="16" width="4" height="1" />
        <rect x="6" y="17" width="3" height="1" />
        <rect x="13" y="17" width="4" height="1" />
        <rect x="6" y="18" width="2" height="1" />
        <rect x="13" y="18" width="3" height="1" />
        <rect x="6" y="19" width="2" height="1" />
        <rect x="13" y="19" width="3" height="1" />
        <rect x="6" y="20" width="2" height="1" />
        <rect x="13" y="20" width="3" height="1" />
        <rect x="5" y="21" width="4" height="1" />
        <rect x="12" y="21" width="5" height="1" />
    </g>
    <!-- Eyes (cut-outs) -->
    <rect x="11" y="3" width="2" height="2" fill="#0c0c0c" />
    <rect x="15" y="3" width="2" height="2" fill="#0c0c0c" />
</svg>